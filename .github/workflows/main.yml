name: CI

on:
  push:
    branches: [ master, github-action, test ]
  pull_request:
    branches: [ master, feat/testAndActions ]

jobs:
  build:
    if: "!contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    name: Test on ${{ matrix.framework }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        framework: [ net6.0, net7.0 ]

    steps:
      - uses: actions/checkout@v2

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x

      - name: Install dependencies
        run: dotnet restore --framework ${{ matrix.framework }}

      - name: Build
        run: dotnet build --configuration Release --no-restore --framework ${{ matrix.framework }}

      - name: Test
        run: dotnet test --no-restore --verbosity normal --framework ${{ matrix.framework }}

      - name: Notification
        if: always()
        id: slack
        uses: wingify/slack-github-action@v1.15.1-wingify
        with:
          channel-id: 'vwo-fs-fme-sdk-job-status'
          slack-message: "<!here> .NET FME SDK Test on *${{ matrix.framework }}* and *${{ matrix.os }}* got *${{ job.status }}* ${{ job.status == 'success' && ':heavy_check_mark:' || ':x:' }} \nCommit: `${{ github.event.head_commit.message }}`. \nCheck the latest build: https://github.com/wingify/vwo-fme-dotnet-sdk/actions"
          color: "${{ job.status == 'success' && '#00FF00' || '#FF0000' }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
